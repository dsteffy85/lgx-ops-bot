# =============================================================================
# Cloud CD Environment Configuration — LGX-OPS-BOT
# =============================================================================
app: lgx-ops-bot
team: sq-logistics
owner: lgx-ops

environments:
  production:
    cluster: ski-production
    namespace: sq-logistics
    image: docker.sqprod.co/sq-logistics/lgx-ops-bot:latest
    replicas: 1

    secrets:
      - name: lgx-ops-bot-slack-token
        mount_path: /etc/secrets/slack
      - name: lgx-ops-bot-snowflake-key
        mount_path: /etc/secrets/snowflake
      - name: lgx-ops-bot-databricks-token
        mount_path: /etc/secrets/databricks

    env:
      SLACK_BOT_TOKEN_PATH: /etc/secrets/slack/token
      SNOWFLAKE_PRIVATE_KEY_PATH: /etc/secrets/snowflake/private_key.pem
      SNOWFLAKE_ACCOUNT: square
      SNOWFLAKE_USER: LGX_OPS_BOT@squareup.com
      SNOWFLAKE_WAREHOUSE: ETL__MEDIUM
      SNOWFLAKE_ROLE: LGX_OPS_BOT__SNOWFLAKE__ADMIN
      DATABRICKS_HOST: https://block-lakehouse-production.cloud.databricks.com
      DATABRICKS_TOKEN_PATH: /etc/secrets/databricks/token
      POLL_INTERVAL: "10"
      BOT_USER_ID: U0ASVFR7NMB
      LOG_LEVEL: INFO
